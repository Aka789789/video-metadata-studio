name: Build And Release

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ github.event_name == 'release' && 'npm run ci:dist:mac:publish' || 'npm run ci:dist:mac' }}

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn

  build-win:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ github.event_name == 'release' && 'npm run ci:dist:win:publish' || 'npm run ci:dist:win' }}

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-release
          retention-days: 14
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn
