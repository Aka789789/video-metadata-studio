name: Build And Release

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ${{ github.event_name == 'release' && 'npm run ci:dist:mac:publish' || 'npm run ci:dist:mac' }}

      - name: Verify mac app signature
        run: |
          set -euo pipefail
          app_path="$(ls -1d release/mac*/视频元数据处理.app | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No built macOS app found in release directory."
            exit 1
          fi
          echo "Verifying app: $app_path"
          codesign --verify --deep --strict --verbose=4 "$app_path"
          spctl -a -vv "$app_path"

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mac-release
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn

      - name: Attach mac assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          fail_on_unmatched_files: false
          tag_name: ${{ github.event.release.tag_name }}

  build-win:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ github.event_name == 'release' && 'npm run ci:dist:win:publish' || 'npm run ci:dist:win' }}

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: win-release
          retention-days: 14
          path: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          if-no-files-found: warn

      - name: Attach windows assets to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
          fail_on_unmatched_files: false
          tag_name: ${{ github.event.release.tag_name }}
